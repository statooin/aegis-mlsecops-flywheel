static_resources:
  listeners:
    - name: listener_0
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 10000
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                access_log:
                  - name: envoy.access_loggers.http
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.Http
                      log_format:
                        json_format:
                          start_time: "%START_TIME%"
                          method: "%REQ(:METHOD)%"
                          path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
                          response_code: "%RESPONSE_CODE%"
                          ai_guard_status: "%RESP(X-AI-GUARD-STATUS)%"
                      http_service:
                        server_uri:
                          uri: http://vector:9000/
                          cluster: vector_cluster
                          timeout: 1s
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: local_service
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: llm_service
                http_filters:
                  # WASM PII Masking Filter (Placeholder)
                  # - name: envoy.filters.http.wasm
                  #   typed_config:
                  #     "@type": type.googleapis.com/envoy.extensions.filters.http.wasm.v3.Wasm
                  #     config:
                  #       name: "pii_masking"
                  #       root_id: "pii_masking"
                  #       vm_config:
                  #         runtime: "envoy.wasm.runtime.v8"
                  #         code:
                  #           local:
                  #             filename: "/etc/envoy/filter.wasm"
                  - name: envoy.filters.http.ext_authz
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                      http_service:
                        server_uri:
                          uri: http://ai-guard:8080/check
                          cluster: ai_guard_cluster
                          timeout: 0.5s
                        authorization_request:
                          allowed_headers:
                            patterns:
                              - exact: "content-type"
                        authorization_response:
                          allowed_upstream_headers:
                            patterns:
                              - exact: "x-ai-guard-status"
                      with_request_body:
                        max_request_bytes: 1024
                        allow_partial_message: true
                        pack_as_bytes: true
                      failure_mode_allow: false # Fail-Close for security
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: llm_service
      connect_timeout: 0.25s
      type: LOGICAL_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: llm_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: postman-echo.com
                      port_value: 80
    - name: ai_guard_cluster
      connect_timeout: 0.25s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: ai_guard_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: ai-guard
                      port_value: 8080
    - name: vector_cluster
      connect_timeout: 0.25s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      http2_protocol_options: {}
      load_assignment:
        cluster_name: vector_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: vector
                      port_value: 9000
